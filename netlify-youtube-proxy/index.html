<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>YouTube Reference</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #player {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const videoId = params.get('v')
      const controls = params.get('controls') === '0' ? 0 : 1
      const modestbranding = params.get('modestbranding') === '0' ? 0 : 1
      const rel = params.get('rel') === '1' ? 1 : 0
      const playsinline = params.get('playsinline') === '0' ? 0 : 1
      const fs = params.get('fs') === '0' ? 0 : 1

      let ytPlayer = null
      let volumeBoostTimer = null
      let volumeProfile = 'speaker'
      let requestedVolume = 100

      function notifyParent(state) {
        try {
          window.parent.postMessage(
            JSON.stringify({ event: 'youtube-state', state }),
            '*',
          )
        } catch {
          // ignore
        }
      }

      function applyVolume() {
        if (!ytPlayer || typeof ytPlayer.unMute !== 'function') return
        const cap = volumeProfile === 'headphones'
          ? Math.min(100, Math.max(0, requestedVolume))
          : 100
        const repeats = volumeProfile === 'headphones' ? 1 : 14
        for (let i = 0; i < repeats; i++) {
          ytPlayer.unMute()
          ytPlayer.setVolume(cap)
        }
      }

      function burstMaxVolume() {
        if (volumeProfile === 'headphones') {
          applyVolume()
          return
        }
        applyVolume()
        window.setTimeout(applyVolume, 40)
        window.setTimeout(applyVolume, 100)
        window.setTimeout(applyVolume, 180)
        window.setTimeout(applyVolume, 320)
        window.setTimeout(applyVolume, 520)
      }

      function startVolumeBoostLoop() {
        stopVolumeBoostLoop()
        burstMaxVolume()
        if (volumeProfile === 'headphones') return
        volumeBoostTimer = window.setInterval(burstMaxVolume, 90)
      }

      function stopVolumeBoostLoop() {
        if (volumeBoostTimer !== null) {
          window.clearInterval(volumeBoostTimer)
          volumeBoostTimer = null
        }
      }

      function invokePlayerCommand(func, args) {
        if (!ytPlayer) return
        const fn = ytPlayer[func]
        if (typeof fn !== 'function') return
        if (func === 'setVolume' && Array.isArray(args) && args.length > 0) {
          requestedVolume = Number(args[0]) || 0
        }
        fn.apply(ytPlayer, args || [])
        if (func === 'playVideo' || func === 'unMute' || func === 'setVolume') {
          burstMaxVolume()
        }
      }

      window.addEventListener('message', (event) => {
        let data = event.data
        if (typeof data === 'string') {
          try {
            data = JSON.parse(data)
          } catch {
            return
          }
        }
        if (!data) return

        if (data.event === 'volume-profile') {
          volumeProfile = data.profile === 'headphones' ? 'headphones' : 'speaker'
          if (volumeProfile === 'headphones') {
            stopVolumeBoostLoop()
          }
          applyVolume()
          return
        }

        if (data.event !== 'command' || typeof data.func !== 'string') return
        invokePlayerCommand(data.func, data.args || [])
      })

      function onYouTubeIframeAPIReady() {
        if (!videoId) return

        ytPlayer = new YT.Player('player', {
          videoId,
          playerVars: {
            autoplay: 0,
            controls,
            modestbranding,
            rel,
            playsinline,
            enablejsapi: 1,
            origin: window.location.origin,
            fs,
            iv_load_policy: 3,
          },
          events: {
            onReady() {
              notifyParent('ready')
              burstMaxVolume()
            },
            onStateChange(event) {
              const state = event.data
              if (state === YT.PlayerState.PLAYING) {
                notifyParent('playing')
                startVolumeBoostLoop()
              } else if (
                state === YT.PlayerState.PAUSED ||
                state === YT.PlayerState.ENDED ||
                state === YT.PlayerState.CUED
              ) {
                stopVolumeBoostLoop()
                if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
                  notifyParent('paused')
                }
              }
            },
          },
        })
      }

      const tag = document.createElement('script')
      tag.src = 'https://www.youtube.com/iframe_api'
      document.head.appendChild(tag)
    </script>
  </body>
</html>
