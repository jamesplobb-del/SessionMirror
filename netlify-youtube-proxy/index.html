<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>YouTube Reference</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #player {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script>
      const params = new URLSearchParams(window.location.search)
      const videoId = params.get('v')
      const controls = params.get('controls') === '0' ? 0 : 1
      const modestbranding = params.get('modestbranding') === '0' ? 0 : 1
      const rel = params.get('rel') === '1' ? 1 : 0
      const playsinline = params.get('playsinline') === '0' ? 0 : 1
      const fs = params.get('fs') === '0' ? 0 : 1

      let ytPlayer = null
      let volumeBoostTimer = null
      let volumeProfile = 'speaker'
      let requestedVolume = 100
      let iframeReady = false
      let lastStateChangeAt = null
      let bufferingCount = 0
      let isSeeking = false
      let seekClearTimer = null
      let lastReportedCurrentTime = null

      function notifyParent(state) {
        try {
          window.parent.postMessage(
            JSON.stringify({ event: 'youtube-state', state }),
            '*',
          )
        } catch {
          // ignore
        }
      }

      function markSeeking() {
        isSeeking = true
        if (seekClearTimer !== null) {
          window.clearTimeout(seekClearTimer)
        }
        seekClearTimer = window.setTimeout(() => {
          isSeeking = false
          seekClearTimer = null
        }, 900)
      }

      function readVideoId() {
        if (!ytPlayer || typeof ytPlayer.getVideoData !== 'function') return videoId
        try {
          const data = ytPlayer.getVideoData()
          return (data && data.video_id) || videoId
        } catch {
          return videoId
        }
      }

      function readNetworkStateHint(playerState, loadedFraction) {
        if (playerState === YT.PlayerState.BUFFERING) return 'buffering'
        if (
          typeof loadedFraction === 'number' &&
          loadedFraction < 0.98 &&
          playerState === YT.PlayerState.PLAYING
        ) {
          return 'loading_while_playing'
        }
        return null
      }

      function postStatus() {
        if (!ytPlayer || typeof ytPlayer.getPlayerState !== 'function') return
        try {
          const playerState = ytPlayer.getPlayerState()
          const currentTime =
            typeof ytPlayer.getCurrentTime === 'function' ? ytPlayer.getCurrentTime() : null
          if (
            lastReportedCurrentTime != null &&
            currentTime != null &&
            Math.abs(currentTime - lastReportedCurrentTime) > 1.25
          ) {
            markSeeking()
          }
          if (currentTime != null) {
            lastReportedCurrentTime = currentTime
          }

          const videoLoadedFraction =
            typeof ytPlayer.getVideoLoadedFraction === 'function'
              ? ytPlayer.getVideoLoadedFraction()
              : null

          window.parent.postMessage(
            JSON.stringify({
              event: 'youtube-status',
              playerState,
              currentTime,
              duration:
                typeof ytPlayer.getDuration === 'function' ? ytPlayer.getDuration() : null,
              isMuted: typeof ytPlayer.isMuted === 'function' ? ytPlayer.isMuted() : null,
              volume: typeof ytPlayer.getVolume === 'function' ? ytPlayer.getVolume() : null,
              playbackRate:
                typeof ytPlayer.getPlaybackRate === 'function'
                  ? ytPlayer.getPlaybackRate()
                  : null,
              iframeReady,
              lastStateChangeAt,
              bufferingCount,
              videoId: readVideoId(),
              isSeeking,
              videoLoadedFraction,
              playbackQuality:
                typeof ytPlayer.getPlaybackQuality === 'function'
                  ? ytPlayer.getPlaybackQuality()
                  : null,
              networkState: readNetworkStateHint(playerState, videoLoadedFraction),
            }),
            '*',
          )
        } catch {
          // ignore
        }
      }

      function applyVolume() {
        if (!ytPlayer || typeof ytPlayer.unMute !== 'function') return
        const cap = volumeProfile === 'headphones'
          ? Math.min(100, Math.max(0, requestedVolume))
          : 100
        const repeats = volumeProfile === 'headphones' ? 1 : 14
        for (let i = 0; i < repeats; i++) {
          ytPlayer.unMute()
          ytPlayer.setVolume(cap)
        }
      }

      function burstMaxVolume() {
        if (volumeProfile === 'headphones') {
          applyVolume()
          return
        }
        applyVolume()
        window.setTimeout(applyVolume, 40)
        window.setTimeout(applyVolume, 100)
        window.setTimeout(applyVolume, 180)
        window.setTimeout(applyVolume, 320)
        window.setTimeout(applyVolume, 520)
      }

      function startVolumeBoostLoop() {
        stopVolumeBoostLoop()
        burstMaxVolume()
        if (volumeProfile === 'headphones') return
        volumeBoostTimer = window.setInterval(burstMaxVolume, 90)
      }

      function stopVolumeBoostLoop() {
        if (volumeBoostTimer !== null) {
          window.clearInterval(volumeBoostTimer)
          volumeBoostTimer = null
        }
      }

      function invokePlayerCommand(func, args) {
        if (func === 'getStatus') {
          postStatus()
          return
        }
        if (!ytPlayer) return
        const fn = ytPlayer[func]
        if (typeof fn !== 'function') return
        if (func === 'setVolume' && Array.isArray(args) && args.length > 0) {
          requestedVolume = Number(args[0]) || 0
        }
        if (func === 'seekTo') {
          markSeeking()
        }
        fn.apply(ytPlayer, args || [])
        if (func === 'playVideo' || func === 'unMute' || func === 'setVolume') {
          burstMaxVolume()
        }
        if (func === 'playVideo' || func === 'pauseVideo' || func === 'seekTo') {
          window.setTimeout(postStatus, 120)
        }
      }

      window.addEventListener('message', (event) => {
        let data = event.data
        if (typeof data === 'string') {
          try {
            data = JSON.parse(data)
          } catch {
            return
          }
        }
        if (!data) return

        if (data.event === 'volume-profile') {
          volumeProfile = data.profile === 'headphones' ? 'headphones' : 'speaker'
          if (volumeProfile === 'headphones') {
            stopVolumeBoostLoop()
          }
          applyVolume()
          return
        }

        if (data.event !== 'command' || typeof data.func !== 'string') return
        invokePlayerCommand(data.func, data.args || [])
      })

      function onYouTubeIframeAPIReady() {
        if (!videoId) return

        ytPlayer = new YT.Player('player', {
          videoId,
          playerVars: {
            autoplay: 0,
            controls,
            modestbranding,
            rel,
            playsinline,
            enablejsapi: 1,
            origin: window.location.origin,
            fs,
            iv_load_policy: 3,
          },
          events: {
            onReady() {
              iframeReady = true
              lastStateChangeAt = Date.now()
              notifyParent('ready')
              burstMaxVolume()
              postStatus()
            },
            onStateChange(event) {
              const state = event.data
              lastStateChangeAt = Date.now()
              if (state === YT.PlayerState.PLAYING) {
                notifyParent('playing')
                startVolumeBoostLoop()
                postStatus()
              } else if (state === YT.PlayerState.BUFFERING) {
                bufferingCount += 1
                notifyParent('buffering')
                postStatus()
              } else if (
                state === YT.PlayerState.PAUSED ||
                state === YT.PlayerState.ENDED ||
                state === YT.PlayerState.CUED
              ) {
                stopVolumeBoostLoop()
                if (state === YT.PlayerState.PAUSED || state === YT.PlayerState.ENDED) {
                  notifyParent('paused')
                }
                postStatus()
              }
            },
          },
        })
      }

      const tag = document.createElement('script')
      tag.src = 'https://www.youtube.com/iframe_api'
      document.head.appendChild(tag)
    </script>
  </body>
</html>
