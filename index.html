<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/png" href="/icons/icon.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="icon" type="image/webp" sizes="192x192" href="/assets/icons/icon-192.webp" />
    <link rel="icon" type="image/webp" sizes="512x512" href="/assets/icons/icon-512.webp" />
    <title>BestTake</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      ;(function () {
        if (typeof navigator === 'undefined') return
        var nav = navigator
        if (!nav.mediaDevices) {
          try {
            Object.defineProperty(nav, 'mediaDevices', { value: {}, writable: true, configurable: true })
          } catch (e) {
            nav.mediaDevices = {}
          }
        }
        if (!nav.mediaDevices.getUserMedia) {
          var legacy = nav.getUserMedia || nav.webkitGetUserMedia || nav.mozGetUserMedia
          if (legacy) {
            nav.mediaDevices.getUserMedia = function (constraints) {
              return new Promise(function (resolve, reject) {
                legacy.call(nav, constraints, resolve, reject)
              })
            }
          }
        }
      })()
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
